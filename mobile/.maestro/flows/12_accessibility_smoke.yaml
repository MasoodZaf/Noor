# Smoke test #12 — accessibility smoke. Exercises every major screen and
# asserts that the most regression-prone accessibilityLabel values are
# reachable. If a label is stripped or renamed accidentally, this flow fails.
#
# Coverage: Home, Quran reader, Hadith filter, Duas, Profile, Discover,
# Settings modals. Asserts ~25 distinct labels.
#
# Run with: maestro test .maestro/flows/12_accessibility_smoke.yaml
appId: com.falah.islamic
tags:
  - smoke
  - a11y
---
- launchApp:
    clearState: false

# ── Home tab ────────────────────────────────────────────────────────────────
- tapOn: "Home"
- assertVisible:
    id: "Notifications"
- assertVisible:
    id: "Search"

# Open notifications modal — verify it opens and prayer-bell switches reachable
- tapOn:
    id: "Notifications"
- assertVisible:
    text: "Adhan Notifications"
- tapOn:
    text: "Done"

# ── Quran tab ───────────────────────────────────────────────────────────────
- tapOn: "Quran"
- assertVisible:
    text: "Al-Fatiha"

# Open the surah reader — back, settings, bookmark all labelled
- tapOn: "Al-Fatiha"
- assertVisible:
    id: "Go back"
- assertVisible:
    id: "Reading settings"
# Settings modal — radio rows for font, reciter, plus tajweed switch
- tapOn:
    id: "Reading settings"
- assertVisible:
    text: "Reading Settings"
- tapOn:
    id: "Close reading settings"
- back

# ── Hadith tab ──────────────────────────────────────────────────────────────
- tapOn: "Hadith"
- assertVisible:
    text: "Sahih al-Bukhari"

# Open Bukhari → bookmark filter is reachable + labelled
- tapOn: "Sahih al-Bukhari"
- assertVisible:
    id: "Show bookmarked only"
- back

# ── Discover tab ────────────────────────────────────────────────────────────
- tapOn: "Discover"
- assertVisible:
    text: "Recitation"
- assertVisible:
    text: "Halal Places"

# Ask AiDeen — scope tabs are role="tab" with selected state
- tapOn: "Ask AiDeen"
- assertVisible:
    text: "Quran"
- assertVisible:
    text: "Hadith"
- assertVisible:
    text: "Fiqh"
- back

# ── Settings (Profile) tab ──────────────────────────────────────────────────
- tapOn: "Settings"
- assertVisible:
    text: "Tweaks"
- assertVisible:
    id: "Adhan Notifications"
- assertVisible:
    id: "Calculation Method"
- assertVisible:
    id: "Database Status"
- assertVisible:
    id: "Privacy Policy"

# Tap Adhan Notifications — opens an alert with explanatory text
- tapOn:
    id: "Adhan Notifications"
- assertVisible:
    text: "bell icon"
- tapOn: "Cancel"

# ── Tab bar a11y — back to Home ─────────────────────────────────────────────
- tapOn: "Home"
- assertVisible:
    id: "Search"
